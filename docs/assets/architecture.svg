  <g transform="translate(720, 700)" font-family="-apple-system, sans-serif">
    <rect width="600" height="150" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="30" font-size="15" font-weight="700" fill="#a78bfa">🎛  Dashboard (Express + WS)</text>
    <g font-size="12" fill="#cbd5e1">
      <text x="20" y="56">• 칸반보드 실시간 반영</text>
      <text x="20" y="76">• 에이전트 상태 · 활동 피드</text>
      <text x="20" y="96">• 회의록 · 자문 전문가 로그</text>
      <text x="20" y="116">• 메트릭스 대시보드 (달성률 시각화)</text>
      <text x="20" y="136">• localhost:3000 · WebSocket 브로드캐스트</text>
    </g>
