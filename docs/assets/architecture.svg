      <text x="100" y="30" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">PO</text>
      <text x="100" y="54" font-size="11" fill="#fae8ff" text-anchor="middle">프로덕트 기획 · 스프린트</text>
      <text x="100" y="72" font-size="10" fill="#f5d0fe" text-anchor="middle">/copywriting</text>
      <text x="100" y="86" font-size="10" fill="#f5d0fe" text-anchor="middle">/web-design-guidelines</text>
    </g>
    <g transform="translate(740, 450)">
      <rect width="200" height="100" rx="12" fill="#db2777"/>
      <text x="100" y="30" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Designer</text>
      <text x="100" y="54" font-size="11" fill="#fce7f3" text-anchor="middle">UI · 디자인 시안</text>
      <text x="100" y="72" font-size="10" fill="#fbcfe8" text-anchor="middle">/frontend-design</text>
      <text x="100" y="86" font-size="10" fill="#fbcfe8" text-anchor="middle">/web-design-guidelines</text>
    </g>
    <g transform="translate(960, 450)">
      <rect width="200" height="100" rx="12" fill="#059669"/>
      <text x="100" y="30" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">QA</text>
      <text x="100" y="54" font-size="11" fill="#d1fae5" text-anchor="middle">테스트 · 보안 감사</text>
      <text x="100" y="72" font-size="10" fill="#a7f3d0" text-anchor="middle">/security-review</text>
      <text x="100" y="86" font-size="10" fill="#a7f3d0" text-anchor="middle">/audit-website</text>
    </g>
    <g transform="translate(1180, 450)">
      <rect width="200" height="100" rx="12" fill="#ea580c"/>
      <text x="100" y="30" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Marketer</text>
      <text x="100" y="54" font-size="11" fill="#ffedd5" text-anchor="middle">광고 · SEO · 성장</text>
