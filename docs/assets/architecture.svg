    <text x="620" y="28" font-size="14" font-weight="700" fill="#e2e8f0" text-anchor="middle">🖥  tmux Sessions — 각 에이전트는 독립 Claude Code 세션</text>
    <g transform="translate(20, 45)">
      <g font-family="monospace" font-size="11" fill="#94a3b8">
        <rect x="0" y="0" width="190" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
        <text x="10" y="20" fill="#67e8f9">▸ ceo-session</text>
        <rect x="200" y="0" width="190" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
        <text x="210" y="20" fill="#67e8f9">▸ cto-session</text>
        <rect x="400" y="0" width="190" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
        <text x="410" y="20" fill="#67e8f9">▸ po-session</text>
        <rect x="600" y="0" width="190" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
        <text x="610" y="20" fill="#67e8f9">▸ designer-session</text>
        <rect x="800" y="0" width="190" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
        <text x="810" y="20" fill="#67e8f9">▸ qa-session</text>
        <rect x="1000" y="0" width="200" height="32" rx="6" fill="#0f172a" stroke="#475569"/>
        <text x="1010" y="20" fill="#67e8f9">▸ marketer-session</text>
      </g>
    </g>
  </g>

  <g transform="translate(80, 700)" font-family="-apple-system, sans-serif">
    <rect width="600" height="150" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="30" font-size="15" font-weight="700" fill="#fbbf24">📁 File-based SSOT</text>
    <g font-family="monospace" font-size="12" fill="#cbd5e1">
      <text x="20" y="56"><tspan fill="#fbbf24">kanban.json</tspan> — 태스크 상태 단일 소스</text>
      <text x="20" y="76"><tspan fill="#fbbf24">metrics.json</tspan> — KPI · 체크포인트 · 판정</text>
      <text x="20" y="96"><tspan fill="#fbbf24">sprints.json</tspan> — 스프린트 데이터</text>
      <text x="20" y="116"><tspan fill="#fbbf24">messages/</tspan> — 에이전트 간 메시지 큐</text>
      <text x="20" y="136"><tspan fill="#fbbf24">docs/</tspan> — 회의록 · 기획 · 디자인 · 결정</text>
    </g>
