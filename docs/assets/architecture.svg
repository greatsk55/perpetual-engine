      <text x="100" y="54" font-size="11" fill="#cffafe" text-anchor="middle">기술 아키텍처 · 개발</text>
      <text x="100" y="72" font-size="10" fill="#a5f3fc" text-anchor="middle">/security-review</text>
      <text x="100" y="86" font-size="10" fill="#a5f3fc" text-anchor="middle">/claude-api /simplify</text>
    </g>
    <g transform="translate(520, 450)">
