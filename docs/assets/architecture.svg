<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="investorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="url(#bgGrad)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="700" y="55" font-size="32" font-weight="700" fill="#f1f5f9" text-anchor="middle">Perpetual Engine Architecture</text>
    <text x="700" y="85" font-size="16" font-weight="400" fill="#94a3b8" text-anchor="middle">투자자 1인 · AI 에이전트 팀 · 파일 기반 SSOT · 실시간 대시보드</text>
  </g>

  <g transform="translate(550, 130)" filter="url(#shadow)">
    <rect width="300" height="90" rx="16" fill="url(#investorGrad)"/>
    <text x="150" y="38" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">👤 INVESTOR (You)</text>
    <text x="150" y="62" font-family="-apple-system, sans-serif" font-size="13" font-weight="400" fill="#fff" text-anchor="middle" opacity="0.9">비전 · 목표 · 우선순위 설정</text>
    <text x="150" y="78" font-family="-apple-system, sans-serif" font-size="13" font-weight="400" fill="#fff" text-anchor="middle" opacity="0.9">CLI · Dashboard 로 개입</text>
  </g>

  <g stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="700" y1="225" x2="700" y2="270"/>
  </g>

  <g transform="translate(480, 280)" filter="url(#shadow)">
