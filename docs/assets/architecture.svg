    <text x="220" y="54" font-family="-apple-system, sans-serif" font-size="12" font-weight="400" fill="#fff" text-anchor="middle" opacity="0.9">sprint phases · message routing · consultant lifecycle · meetings</text>
  </g>

  <g stroke="#a78bfa" stroke-width="1.5" fill="none" marker-end="url(#arrowPurple)" stroke-opacity="0.7">
    <path d="M 550 360 Q 280 400 180 450"/>
    <path d="M 620 360 L 380 450"/>
    <path d="M 700 360 L 600 450"/>
    <path d="M 780 360 L 820 450"/>
    <path d="M 850 360 L 1040 450"/>
    <path d="M 870 360 Q 1100 400 1260 450"/>
  </g>

