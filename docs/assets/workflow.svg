<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" width="1400" height="700">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="stepGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="stepGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="stepGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="stepGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="stepGrad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="700" fill="url(#bgGrad)"/>

  <text x="700" y="55" font-family="-apple-system, sans-serif" font-size="30" font-weight="700" fill="#f1f5f9" text-anchor="middle">Sprint Workflow</text>
  <text x="700" y="85" font-family="-apple-system, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">각 페이즈는 독립 Claude Code 세션 · 에이전트 간 파일 기반 핸드오프</text>

  <g font-family="-apple-system, sans-serif" filter="url(#shadow)">
    <g transform="translate(60, 140)">
      <rect width="240" height="280" rx="16" fill="url(#stepGrad1)"/>
      <text x="120" y="40" font-size="44" text-anchor="middle">📋</text>
      <text x="120" y="80" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">1. Planning</text>
      <text x="120" y="105" font-size="12" fill="#e0e7ff" text-anchor="middle">CEO · PO</text>
      <line x1="30" y1="120" x2="210" y2="120" stroke="#fff" stroke-opacity="0.3"/>
      <g font-size="12" fill="#e0e7ff">
        <text x="120" y="145" text-anchor="middle">비전 / 가설 수립</text>
        <text x="120" y="170" text-anchor="middle">KPI · 측정 기간 정의</text>
        <text x="120" y="195" text-anchor="middle">스프린트 백로그 생성</text>
        <text x="120" y="220" text-anchor="middle">우선순위 결정</text>
      </g>
      <g transform="translate(120, 250)">
        <rect x="-70" y="0" width="140" height="22" rx="11" fill="#0f172a" fill-opacity="0.3"/>
        <text y="15" font-size="10" font-family="monospace" fill="#fff" text-anchor="middle">docs/planning/</text>
      </g>
    </g>

    <g transform="translate(340, 140)">
      <rect width="240" height="280" rx="16" fill="url(#stepGrad2)"/>
      <text x="120" y="40" font-size="44" text-anchor="middle">🎨</text>
      <text x="120" y="80" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">2. Design</text>
      <text x="120" y="105" font-size="12" fill="#fae8ff" text-anchor="middle">Designer · PO</text>
      <line x1="30" y1="120" x2="210" y2="120" stroke="#fff" stroke-opacity="0.3"/>
      <g font-size="12" fill="#fae8ff">
        <text x="120" y="145" text-anchor="middle">와이어프레임 / UI 시안</text>
        <text x="120" y="170" text-anchor="middle">UX 플로우 설계</text>
        <text x="120" y="195" text-anchor="middle">디자인 시스템 점검</text>
        <text x="120" y="220" text-anchor="middle">카피 · 메시지 톤</text>
      </g>
      <g transform="translate(120, 250)">
        <rect x="-70" y="0" width="140" height="22" rx="11" fill="#0f172a" fill-opacity="0.3"/>
        <text y="15" font-size="10" font-family="monospace" fill="#fff" text-anchor="middle">docs/design/</text>
      </g>
    </g>

    <g transform="translate(620, 140)">
      <rect width="240" height="280" rx="16" fill="url(#stepGrad3)"/>
      <text x="120" y="40" font-size="44" text-anchor="middle">💻</text>
      <text x="120" y="80" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">3. Development</text>
      <text x="120" y="105" font-size="12" fill="#fce7f3" text-anchor="middle">CTO</text>
      <line x1="30" y1="120" x2="210" y2="120" stroke="#fff" stroke-opacity="0.3"/>
      <g font-size="12" fill="#fce7f3">
        <text x="120" y="145" text-anchor="middle">아키텍처 / 구현</text>
        <text x="120" y="170" text-anchor="middle">코드 작성 · 커밋</text>
        <text x="120" y="195" text-anchor="middle">의존성 · 배포 파이프라인</text>
        <text x="120" y="220" text-anchor="middle">성능 · 보안 점검</text>
      </g>
      <g transform="translate(120, 250)">
        <rect x="-70" y="0" width="140" height="22" rx="11" fill="#0f172a" fill-opacity="0.3"/>
        <text y="15" font-size="10" font-family="monospace" fill="#fff" text-anchor="middle">workspace/</text>
      </g>
    </g>

    <g transform="translate(900, 140)">
      <rect width="240" height="280" rx="16" fill="url(#stepGrad4)"/>
      <text x="120" y="40" font-size="44" text-anchor="middle">🧪</text>
      <text x="120" y="80" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">4. Testing</text>
      <text x="120" y="105" font-size="12" fill="#ffedd5" text-anchor="middle">QA · CTO</text>
      <line x1="30" y1="120" x2="210" y2="120" stroke="#fff" stroke-opacity="0.3"/>
      <g font-size="12" fill="#ffedd5">
        <text x="120" y="145" text-anchor="middle">기능 / E2E 테스트</text>
        <text x="120" y="170" text-anchor="middle">보안 · 접근성 감사</text>
        <text x="120" y="195" text-anchor="middle">버그 리포트 · 회의 소집</text>
        <text x="120" y="220" text-anchor="middle">Go / No-Go 판정</text>
      </g>
      <g transform="translate(120, 250)">
        <rect x="-70" y="0" width="140" height="22" rx="11" fill="#0f172a" fill-opacity="0.3"/>
        <text y="15" font-size="10" font-family="monospace" fill="#fff" text-anchor="middle">docs/decisions/</text>
      </g>
    </g>

    <g transform="translate(1180, 140)">
      <rect width="180" height="280" rx="16" fill="url(#stepGrad5)"/>
      <text x="90" y="40" font-size="44" text-anchor="middle">🚀</text>
      <text x="90" y="80" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">5. Launch</text>
      <text x="90" y="105" font-size="12" fill="#d1fae5" text-anchor="middle">Marketer · CEO</text>
      <line x1="20" y1="120" x2="160" y2="120" stroke="#fff" stroke-opacity="0.3"/>
      <g font-size="11" fill="#d1fae5">
        <text x="90" y="145" text-anchor="middle">배포</text>
        <text x="90" y="170" text-anchor="middle">SEO · 광고 · PR</text>
        <text x="90" y="195" text-anchor="middle">사용자 피드백 수집</text>
        <text x="90" y="220" text-anchor="middle">KPI 모니터링</text>
      </g>
      <g transform="translate(90, 250)">
        <rect x="-70" y="0" width="140" height="22" rx="11" fill="#0f172a" fill-opacity="0.3"/>
        <text y="15" font-size="10" font-family="monospace" fill="#fff" text-anchor="middle">docs/marketing/</text>
      </g>
    </g>
  </g>

  <g stroke="#475569" stroke-width="2" fill="none">
    <path d="M 300 280 L 340 280" marker-end="url(#arrowGray)"/>
    <path d="M 580 280 L 620 280"/>
    <path d="M 860 280 L 900 280"/>
    <path d="M 1140 280 L 1180 280"/>
  </g>
  <g fill="#94a3b8">
    <polygon points="330,275 340,280 330,285"/>
    <polygon points="610,275 620,280 610,285"/>
    <polygon points="890,275 900,280 890,285"/>
    <polygon points="1170,275 1180,280 1170,285"/>
  </g>

  <g transform="translate(60, 460)" font-family="-apple-system, sans-serif">
    <rect width="1300" height="210" rx="16" fill="#1e293b" stroke="#334155"/>
    <text x="30" y="38" font-size="18" font-weight="700" fill="#fbbf24">🔄 Continuous Loop — 모든 페이즈에서 가능</text>

    <g transform="translate(30, 60)">
      <g transform="translate(0, 0)">
        <rect width="300" height="130" rx="10" fill="#0f172a" stroke="#475569"/>
        <text x="20" y="30" font-size="14" font-weight="700" fill="#a78bfa">📊 Metrics Evaluation</text>
        <g font-size="12" fill="#cbd5e1">
          <text x="20" y="55">체크포인트마다 KPI 달성도 측정</text>
          <text x="20" y="75"><tspan fill="#10b981">&gt;=120%</tspan> 확대 · <tspan fill="#22d3ee">&gt;=100%</tspan> 유지</text>
          <text x="20" y="95"><tspan fill="#fbbf24">&gt;=60%</tspan> 반복개선 · <tspan fill="#f97316">&gt;=30%</tspan> 방향전환</text>
          <text x="20" y="115"><tspan fill="#ef4444">&lt;30%</tspan> 폐기 — 자동 판정</text>
        </g>
      </g>

      <g transform="translate(330, 0)">
        <rect width="300" height="130" rx="10" fill="#0f172a" stroke="#475569"/>
        <text x="20" y="30" font-size="14" font-weight="700" fill="#f0abfc">🗣  Multi-Agent Meeting</text>
        <g font-size="12" fill="#cbd5e1">
          <text x="20" y="55">이슈 발생 시 유관 에이전트 소집</text>
          <text x="20" y="75">issue_discussion · consultation</text>
          <text x="20" y="95">관련 태스크 컨텍스트 자동 연결</text>
          <text x="20" y="115">docs/meetings/에 회의록 생성</text>
        </g>
      </g>

      <g transform="translate(660, 0)">
        <rect width="300" height="130" rx="10" fill="#0f172a" stroke="#475569"/>
        <text x="20" y="30" font-size="14" font-weight="700" fill="#67e8f9">🎓 Ephemeral Consultant</text>
        <g font-size="12" fill="#cbd5e1">
          <text x="20" y="55">"GDPR 변호사" 같은 전문가 즉석 생성</text>
          <text x="20" y="75">expertise 자유 서술 → 맞춤 에이전트</text>
          <text x="20" y="95">자문 후 자동 소멸 (5분 타임아웃)</text>
          <text x="20" y="115">회의에도 초대 가능</text>
        </g>
      </g>

      <g transform="translate(990, 0)">
        <rect width="280" height="130" rx="10" fill="#0f172a" stroke="#475569"/>
        <text x="20" y="30" font-size="14" font-weight="700" fill="#fb923c">👤 User Intervention</text>
        <g font-size="12" fill="#cbd5e1">
          <text x="20" y="55">perpetual-engine message "..."</text>
          <text x="20" y="75">task run / suspend / resume</text>
          <text x="20" y="95">pause / resume 전체 에이전트</text>
          <text x="20" y="115">언제든 방향 전환 지시 가능</text>
        </g>
      </g>
    </g>
  </g>
</svg>
